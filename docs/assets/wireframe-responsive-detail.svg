<svg width="1440" height="760" viewBox="0 0 1440 760" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">Responsive and execution detail wireframe</title>
  <desc id="desc">Mid fidelity wireframe showing execution details drawer and stacked responsive mobile layout.</desc>
  <rect width="1440" height="760" fill="#F3F5F8"/>
  <text x="72" y="58" fill="#17212F" font-family="Segoe UI, Arial, sans-serif" font-size="28" font-weight="700">Execution Details + Responsive Behavior</text>
  <text x="72" y="88" fill="#657286" font-family="Segoe UI, Arial, sans-serif" font-size="15">The workflow preserves transparency after a run and stacks cleanly on small screens.</text>

  <defs>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="14" stdDeviation="18" flood-color="#263040" flood-opacity="0.12"/>
    </filter>
    <linearGradient id="dark" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0" stop-color="#20242B"/>
      <stop offset="1" stop-color="#243833"/>
    </linearGradient>
  </defs>

  <g filter="url(#shadow)">
    <rect x="72" y="130" width="836" height="552" rx="14" fill="#FFFFFF" stroke="#D8DFE8"/>
    <rect x="72" y="130" width="836" height="56" rx="14" fill="url(#dark)"/>
    <text x="100" y="166" fill="#FFFFFF" font-family="Segoe UI, Arial, sans-serif" font-size="18" font-weight="700">Execution Details Drawer</text>

    <rect x="104" y="220" width="504" height="408" rx="10" fill="#F8FAFC" stroke="#D8DFE8"/>
    <text x="132" y="254" fill="#657286" font-family="Segoe UI, Arial, sans-serif" font-size="12" font-weight="700">MAIN WORKSPACE REMAINS VISIBLE</text>
    <rect x="132" y="284" width="150" height="86" rx="10" fill="#FFFFFF" stroke="#D8DFE8"/>
    <text x="152" y="318" fill="#17212F" font-family="Segoe UI, Arial, sans-serif" font-size="16" font-weight="700">Repo signals</text>
    <text x="152" y="344" fill="#657286" font-family="Segoe UI, Arial, sans-serif" font-size="12">CI, coverage, risk</text>
    <rect x="306" y="284" width="150" height="86" rx="10" fill="#FFFFFF" stroke="#D8DFE8"/>
    <text x="326" y="318" fill="#17212F" font-family="Segoe UI, Arial, sans-serif" font-size="16" font-weight="700">Task cards</text>
    <text x="326" y="344" fill="#657286" font-family="Segoe UI, Arial, sans-serif" font-size="12">Tests, scan, PR</text>
    <rect x="132" y="404" width="430" height="146" rx="10" fill="#181C22" stroke="#2B313B"/>
    <text x="154" y="438" fill="#DDE5EF" font-family="Consolas, monospace" font-size="13">agent-runtime</text>
    <text x="154" y="470" fill="#AAB6C8" font-family="Consolas, monospace" font-size="12">Running repository validation...</text>
    <text x="154" y="498" fill="#FFC7BF" font-family="Consolas, monospace" font-size="12">Failure captured before changes</text>

    <rect x="636" y="204" width="240" height="438" rx="12" fill="#FFFFFF" stroke="#CFE0F5"/>
    <text x="660" y="240" fill="#657286" font-family="Segoe UI, Arial, sans-serif" font-size="12" font-weight="700">DRAWER</text>
    <text x="660" y="270" fill="#17212F" font-family="Segoe UI, Arial, sans-serif" font-size="20" font-weight="700">Run test suite</text>
    <rect x="660" y="300" width="192" height="76" rx="8" fill="#F8FAFC" stroke="#D8DFE8"/>
    <text x="676" y="326" fill="#657286" font-family="Segoe UI, Arial, sans-serif" font-size="11" font-weight="700">RUN PROFILE</text>
    <text x="676" y="352" fill="#17212F" font-family="Segoe UI, Arial, sans-serif" font-size="13" font-weight="700">892 records scanned</text>
    <rect x="660" y="392" width="192" height="86" rx="8" fill="#F1FBF7" stroke="#C9E9DF"/>
    <text x="676" y="418" fill="#657286" font-family="Segoe UI, Arial, sans-serif" font-size="11" font-weight="700">BASIC DATA SOURCE</text>
    <text x="676" y="444" fill="#17212F" font-family="Segoe UI, Arial, sans-serif" font-size="13" font-weight="700">Titanic dataset</text>
    <text x="676" y="464" fill="#4D5A6D" font-family="Segoe UI, Arial, sans-serif" font-size="12">CC0 / 891 rows</text>
    <rect x="660" y="494" width="192" height="110" rx="8" fill="#FFFFFF" stroke="#D8DFE8"/>
    <text x="676" y="522" fill="#657286" font-family="Segoe UI, Arial, sans-serif" font-size="11" font-weight="700">ARTIFACTS</text>
    <text x="676" y="548" fill="#17212F" font-family="Segoe UI, Arial, sans-serif" font-size="12">Failure summary</text>
    <text x="676" y="572" fill="#17212F" font-family="Segoe UI, Arial, sans-serif" font-size="12">Retry recommendation</text>
  </g>

  <g filter="url(#shadow)">
    <rect x="1000" y="130" width="328" height="552" rx="32" fill="#20242B"/>
    <rect x="1018" y="154" width="292" height="504" rx="24" fill="#FFFFFF"/>
    <text x="1040" y="196" fill="#17212F" font-family="Segoe UI, Arial, sans-serif" font-size="16" font-weight="700">Responsive mobile stack</text>
    <rect x="1040" y="222" width="248" height="72" rx="10" fill="#F8FAFC" stroke="#D8DFE8"/>
    <text x="1058" y="250" fill="#657286" font-family="Segoe UI, Arial, sans-serif" font-size="11" font-weight="700">1. REPOSITORY LIST</text>
    <text x="1058" y="274" fill="#17212F" font-family="Segoe UI, Arial, sans-serif" font-size="13" font-weight="700">Search, filters, cards</text>
    <rect x="1040" y="314" width="248" height="96" rx="10" fill="#F7FBFF" stroke="#CFE0F5"/>
    <text x="1058" y="342" fill="#657286" font-family="Segoe UI, Arial, sans-serif" font-size="11" font-weight="700">2. REPO OVERVIEW</text>
    <text x="1058" y="366" fill="#17212F" font-family="Segoe UI, Arial, sans-serif" font-size="13" font-weight="700">Insights and Run Agent</text>
    <rect x="1058" y="382" width="96" height="18" rx="9" fill="#0A84FF"/>
    <rect x="1040" y="430" width="248" height="102" rx="10" fill="#F1FBF7" stroke="#C9E9DF"/>
    <text x="1058" y="458" fill="#657286" font-family="Segoe UI, Arial, sans-serif" font-size="11" font-weight="700">3. AGENT TASKS</text>
    <text x="1058" y="482" fill="#17212F" font-family="Segoe UI, Arial, sans-serif" font-size="13" font-weight="700">Stacked selectable cards</text>
    <rect x="1058" y="500" width="84" height="18" rx="9" fill="#EAF4FF"/>
    <rect x="1154" y="500" width="84" height="18" rx="9" fill="#EAF4FF"/>
    <rect x="1040" y="552" width="248" height="74" rx="10" fill="#181C22" stroke="#2B313B"/>
    <text x="1058" y="582" fill="#DDE5EF" font-family="Consolas, monospace" font-size="11">4. Live console</text>
    <text x="1058" y="604" fill="#AAB6C8" font-family="Consolas, monospace" font-size="10">Progress, details, retry</text>
  </g>
</svg>
